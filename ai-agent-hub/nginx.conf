server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — all routes resolve to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Security headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self)" always;

  # Content-Security-Policy — STARTER, in Report-Only mode so it never breaks the
  # app: violations are logged to the browser console / report endpoint instead of
  # being blocked. Verify the console is clean across the app (sign-in, maps, chat),
  # then:
  #   1) replace YOUR_API_ORIGIN with your real backend origins in connect-src
  #      (e.g. https://api.omnia.app), and your real Clerk domain,
  #   2) rename the header to "Content-Security-Policy" to ENFORCE it.
  # Clerk needs its script/frame/connect origins; Leaflet/Unsplash need https images;
  # Tailwind/Framer inject inline styles, so style-src keeps 'unsafe-inline'.
  add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://*.clerk.com YOUR_API_ORIGIN; frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com; worker-src 'self' blob:" always;
}
